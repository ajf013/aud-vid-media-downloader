<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReClip — Free Media Downloader</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    :root {
      --radius: 20px;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme='dark'] {
      --bg: #0f1115;
      --fg: #eef1f5;
      --accent: #f09c00;
      --accent-hover: #d18700;
      --muted: #8a8f98;
      --card: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.1);
      --success: #2d8a4e;
      --error: #c43d3d;
      --glass: rgba(255, 255, 255, 0.02);
      --glass-hover: rgba(255, 255, 255, 0.05);
      --shimmer: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      --shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    [data-theme='light'] {
      --bg: #f8f9fa;
      --fg: #1a1a1a;
      --accent: #f09c00;
      --accent-hover: #e08b00;
      --muted: #6c757d;
      --card: #ffffff;
      --card-border: #e9ecef;
      --success: #28a745;
      --error: #dc3545;
      --glass: #ffffff;
      --glass-hover: #f1f3f5;
      --shimmer: linear-gradient(90deg, #f1f3f5 25%, #e9ecef 50%, #f1f3f5 75%);
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* Ambient Background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      width: 40%;
      height: 40%;
      background: radial-gradient(circle, rgba(240, 156, 0, 0.05) 0%, transparent 70%);
      filter: blur(80px);
      z-index: -1;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(240, 156, 0, 0.03) 0%, transparent 70%);
      filter: blur(100px);
      z-index: -1;
      pointer-events: none;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px 100px;
    }

    .brand { margin-bottom: 60px; text-align: center; }
    .brand h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 5rem;
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 0.9;
      background: linear-gradient(135deg, white 30%, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .brand p {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .input-wrap {
      background: var(--glass);
      border: 1px solid var(--card-border);
      padding: 10px;
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      margin-bottom: 40px;
      transition: var(--transition);
    }
    .input-wrap:focus-within {
      border-color: rgba(240, 156, 0, 0.3);
      transform: translateY(-2px);
    }

    textarea {
      width: 100%;
      padding: 20px;
      border: none;
      background: transparent;
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      resize: none;
      min-height: 60px;
    }
    textarea::placeholder { color: var(--muted); opacity: 0.6; }

    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin: 12px 10px 20px;
      opacity: 0.7;
    }

    .controls {
      display: flex;
      gap: 12px;
      padding: 0 10px;
      align-items: center;
    }
    .pill-group {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 4px;
      transition: var(--transition);
    }
    .pill {
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px;
      letter-spacing: 0.02em;
    }
    .pill.active { background: var(--accent); color: #000; }
    .pill:not(.active):hover { color: var(--fg); background: rgba(255,255,255,0.05); }

    .fetch-btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .fetch-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    .fetch-btn:active { transform: scale(0.96); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Cards */
    .cards { margin-top: 40px; }

    .card {
      display: flex;
      gap: 20px;
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--glass);
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .card:hover { border-color: rgba(255, 255, 255, 0.2); background: var(--glass-hover); }

    .card-thumb {
      width: 150px;
      min-width: 150px;
      height: 100px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
      position: relative;
    }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .card-thumb .no-thumb { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .card-thumb .no-thumb i { font-size: 2rem; opacity: 0.4; }

    /* Shimmer skeleton */
    .card-thumb.loading { background: var(--shimmer); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .skeleton-line { height: 14px; border-radius: 6px; background: var(--shimmer); background-size: 200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 8px; }
    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 75%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .card-title { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 500; color: var(--fg); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; font-weight: 500; }

    .card-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .card-dl-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #000;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      text-transform: uppercase;
    }
    .card-dl-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .card-dl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .card-dl-btn.done { background: var(--success); color: #fff; }
    .card-dl-btn.error { background: var(--error); color: #fff; }

    .card-status { font-size: 0.72rem; color: var(--muted); font-weight: 500; }
    .card-status.downloading { color: var(--accent); }

    .q-chip {
      padding: 5px 12px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .q-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(240,156,0,0.05); }
    .q-chip:hover:not(.active) { border-color: rgba(255,255,255,0.2); }

    .dl-all-bar { display: flex; gap: 12px; margin-top: 24px; }
    .dl-all-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      box-shadow: var(--shadow);
    }
    .dl-all-btn:hover { background: #fff; transform: translateY(-4px); }

    /* Footer styles */
    .footer_content {
        text-align: center;
        color: var(--accent);
        font-size: 0.85rem;
        opacity: 0.8;
    }

    .footer_main {
        padding: 80px 24px 50px;
        margin-top: 60px;
        border-top: 1px solid rgba(255,255,255,0.05);
    }

    .footer_Icons {
        text-align: center;
        padding-bottom: 24px;
    }

    .footer_Icons span {
        margin: 0 12px;
        display: inline-block;
    }

    .footer_Icons a {
        color: var(--muted);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: inline-block;
    }
    
    .footer_Icons .footer_git a:hover { color: #fff; transform: scale(1.3) translateY(-4px); }
    .footer_Icons .footer_link a:hover { color: #0077b5; transform: scale(1.3) translateY(-4px); }
    .footer_Icons .footer_insta a:hover { color: #e4405f; transform: scale(1.3) translateY(-4px); }
    .footer_Icons .footer_wht a:hover { color: #25d366; transform: scale(1.3) translateY(-4px); }
    .footer_Icons .footer_twi a:hover { color: #fff; transform: scale(1.3) translateY(-4px); }

    /* Theme Toggle */
    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--glass);
      border: 1px solid var(--card-border);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1000;
      transition: var(--transition);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .theme-toggle:hover {
      transform: scale(1.1) rotate(15deg);
      background: var(--glass-hover);
      border-color: var(--accent);
    }
    .theme-toggle i { font-size: 1.2rem; }

    [data-theme='light'] body::before, 
    [data-theme='light'] body::after { opacity: 0.6; }

    /* Progress Bar */
    .progress-wrap {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 4px;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 600;
    }

    @media (max-width: 500px) {
      .brand h1 { font-size: 3.5rem; }
      .page { padding: 40px 16px 60px; }
      .card { flex-direction: column; gap: 12px; }
      .card-thumb { width: 100%; height: 180px; }
      .card-title { white-space: normal; }
      .controls { flex-direction: column; }
      .pill-group, .fetch-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
    <i class="fa-solid fa-moon"></i>
  </button>
  <div class="page">
    <div class="brand">
      <h1>ReClip</h1>
      <p>Premium Media Downloader</p>
    </div>

    <div class="input-wrap">
      <textarea id="urls" placeholder="Paste one or more URLs..." rows="2"></textarea>
      <div class="controls">
        <div class="pill-group">
          <button class="pill active" data-format="video" onclick="setFormat(this)">MP4</button>
          <button class="pill" data-format="audio" onclick="setFormat(this)">MP3</button>
        </div>
        <button class="fetch-btn" id="goBtn" onclick="go()">Fetch Content</button>
      </div>
    </div>
    <p class="hint">Multiple links? Separate with spaces, commas, or newlines.</p>

    <div id="cards" class="cards"></div>

    <div data-aos="fade-up" class="footer_main">
        <div class="footer_Icons">
            <span class="footer_git"><a target="_blank" rel="noreferrer noopener" href="https://github.com/ajf013"><i class="fa-brands fa-github fa-2x"></i></a></span>
            <span class="footer_link"><a target="_blank" rel="noreferrer noopener" href="https://www.linkedin.com/in/ajf013-francis-cruz/"><i class="fa-brands fa-linkedin fa-2x"></i></a></span>
            <span class="footer_insta"><a target="_blank" rel="noreferrer noopener" href="https://www.instagram.com/fcruz_013/"><i class="fa-brands fa-instagram fa-2x"></i></a></span>
            <span class="footer_wht"><a target="_blank" rel="noreferrer noopener" href="https://api.whatsapp.com/send?phone=916379649461"><i class="fa-brands fa-whatsapp fa-2x"></i></a></span>
            <span class="footer_twi"><a target="_blank" rel="noreferrer noopener" href="https://x.com/Itsme_Ajf013" aria-label="X (formerly Twitter)">
                <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 26px; height: 26px; fill: currentColor; vertical-align: middle; margin-top: -3px;">
                    <g><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></g>
                </svg>
            </a></span>
        </div>
        <div class="footer_content">
            <span>Copyrights <i class="fa-regular fa-copyright"></i> <span id="current-year"></span> <strong>Francis Cruz</strong></span>
        </div>
    </div>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <script>
    let currentFormat = 'video';
    let cardData = [];

    function setFormat(btn) {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFormat = btn.dataset.format;
    }

    function parseUrls(text) {
      return [...new Set(text.split(/[\s,]+/).map(u => u.trim()).filter(u => u.startsWith('http')))];
    }

    function fmtDur(s) {
      if (!s) return '';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function friendlyError(err) {
      if (err.includes('Unsupported URL')) return 'This URL is not supported';
      if (err.includes('Video unavailable')) return 'Video is unavailable or private';
      if (err.includes('Private video')) return 'This video is private';
      if (err.includes('HTTP Error 403')) return 'Access denied by the platform';
      if (err.includes('HTTP Error 404')) return 'Video not found';
      if (err.includes('copyright')) return 'Video blocked due to copyright';
      if (err.includes('geo')) return 'Video not available in your region';
      if (err.includes('timed out') || err.includes('Timed out')) return 'Request timed out — try again';
      if (err.includes('network') || err.includes('Network')) return 'Network error — check your connection';
      return err.length > 80 ? err.slice(0, 80) + '...' : err;
    }

    document.getElementById('urls').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
    });

    async function go() {
      const urls = parseUrls(document.getElementById('urls').value);
      if (!urls.length) return;

      const btn = document.getElementById('goBtn');
      const container = document.getElementById('cards');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      container.innerHTML = '';
      cardData = [];

      for (let i = 0; i < urls.length; i++) {
        const url = urls[i];
        const idx = cardData.length;
        cardData.push({ url, status: 'loading' });
        renderCard(idx);

        try {
          const res = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (data.error) {
            cardData[idx] = { ...cardData[idx], status: 'info-error', error: data.error };
          } else {
            cardData[idx] = {
              ...cardData[idx],
              status: 'ready',
              title: data.title || '',
              thumbnail: data.thumbnail || '',
              duration: data.duration,
              uploader: data.uploader || '',
              formats: data.formats || [],
              selectedFormatId: data.formats?.[0]?.id || null,
            };
          }
        } catch (err) {
          cardData[idx] = { ...cardData[idx], status: 'info-error', error: err.message };
        }
        renderCard(idx);
      }

      if (cardData.filter(c => c.status === 'ready').length > 1) {
        renderDownloadAll();
      }

      btn.disabled = false;
      btn.textContent = 'Fetch';
    }

    function renderCard(idx) {
      const c = cardData[idx];
      let el = document.getElementById(`card-${idx}`);
      if (!el) {
        el = document.createElement('div');
        el.id = `card-${idx}`;
        el.className = 'card';
        document.getElementById('cards').appendChild(el);
      }

      // Loading skeleton
      if (c.status === 'loading') {
        el.className = 'card';
        el.innerHTML = `
          <div class="card-thumb loading"></div>
          <div class="card-body">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
          </div>
        `;
        return;
      }

      // Error state
      if (c.status === 'info-error') {
        el.className = 'card card-error';
        el.innerHTML = `
          <div class="card-thumb">
            <div class="card-error-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title" style="color:var(--error)">Could not fetch video</div>
            <div class="card-error-msg">${esc(friendlyError(c.error || ''))}</div>
            <div class="card-error-url">${esc(c.url)}</div>
          </div>
        `;
        return;
      }

      // Ready / downloading / done / error states
      el.className = 'card';
      const isAudio = currentFormat === 'audio';

      let thumbHtml;
      if (isAudio) {
        thumbHtml = `<div class="no-thumb" style="color:var(--accent)"><i class="fa-solid fa-play"></i></div>`;
      } else if (c.thumbnail) {
        thumbHtml = `<img src="${c.thumbnail}" alt="">`;
      } else {
        thumbHtml = `<div class="no-thumb"><i class="fa-regular fa-image"></i></div>`;
      }

      let qualityChips = '';
      if (!isAudio && c.formats && c.formats.length > 1) {
        qualityChips = c.formats.map(f =>
          `<button class="q-chip${f.id === c.selectedFormatId ? ' active' : ''}" onclick="pickFormat(${idx}, '${f.id}')">${f.label}</button>`
        ).join('');
      }

      let actionHtml = '';
      if (c.status === 'ready') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Download</button>${qualityChips}`;
      } else if (c.status === 'downloading') {
        const progress = c.progress || 0;
        actionHtml = `
          <div style="width: 100%">
            <div class="progress-wrap">
              <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
            <div class="progress-text">
              <span>${progress.toFixed(1)}% · ${c.speed || '0 B/s'}</span>
              <span>ETA: ${c.eta || '--:--'}</span>
            </div>
          </div>
        `;
      } else if (c.status === 'done') {
        actionHtml = `<button class="card-dl-btn done" onclick="saveCard(${idx})">Save</button>
          <span class="card-status done">${esc(c.filename || '')}</span>`;
      } else if (c.status === 'error') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Retry</button>
          <span class="card-status error">${esc(friendlyError(c.error || 'Download failed'))}</span>`;
      }

      el.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-title">${esc(c.title || 'Untitled')}</div>
          <div class="card-meta">${esc(c.uploader)}${c.duration ? ' · ' + fmtDur(c.duration) : ''}</div>
          <div class="card-actions">${actionHtml}</div>
        </div>
      `;
    }

    function renderDownloadAll() {
      const existing = document.getElementById('dl-all-bar');
      if (existing) existing.remove();

      const bar = document.createElement('div');
      bar.id = 'dl-all-bar';
      bar.className = 'dl-all-bar';
      bar.innerHTML = `<button class="dl-all-btn" onclick="dlAll()">Download All</button>`;
      document.getElementById('cards').appendChild(bar);
    }

    function pickFormat(idx, formatId) {
      cardData[idx].selectedFormatId = formatId;
      renderCard(idx);
    }

    async function dlCard(idx) {
      const c = cardData[idx];
      c.status = 'downloading';
      c.error = null;
      renderCard(idx);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: c.url,
            format: currentFormat,
            format_id: c.selectedFormatId,
            title: c.title || '',
          }),
        });
        const data = await res.json();
        if (data.error) {
          c.status = 'error';
          c.error = data.error;
          renderCard(idx);
          return;
        }
        c.jobId = data.job_id;
        pollCard(idx);
      } catch (err) {
        c.status = 'error';
        c.error = err.message;
        renderCard(idx);
      }
    }

    function pollCard(idx) {
      const c = cardData[idx];
      const iv = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${c.jobId}`);
          const data = await res.json();
          if (data.status === 'done') {
            clearInterval(iv);
            c.status = 'done';
            c.filename = data.filename;
            renderCard(idx);
            saveCard(idx);
          } else if (data.status === 'downloading') {
            c.progress = data.progress;
            c.speed = data.speed;
            c.eta = data.eta;
            renderCard(idx);
          } else if (data.status === 'error') {
            clearInterval(iv);
            c.status = 'error';
            c.error = data.error;
            renderCard(idx);
          }
        } catch {
          clearInterval(iv);
          c.status = 'error';
          c.error = 'Lost connection to server';
          renderCard(idx);
        }
      }, 1000);
    }

    function saveCard(idx) {
      const c = cardData[idx];
      if (!c.jobId) return;
      const a = document.createElement('a');
      a.href = `/api/file/${c.jobId}`;
      a.download = c.filename || '';
      a.click();
    }

    async function dlAll() {
      const btn = document.querySelector('.dl-all-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Downloading...'; }

      for (let i = 0; i < cardData.length; i++) {
        if (cardData[i].status === 'ready') {
          await dlCard(i);
        }
      }

      if (btn) { btn.disabled = false; btn.textContent = 'Download All'; }
    }

    // Initialize UI elements
    document.getElementById('current-year').textContent = new Date().getFullYear();
    AOS.init({ duration: 1000, once: true });

    function initTheme() {
      const saved = localStorage.getItem('reclip-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', saved);
      updateThemeIcon(saved);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('reclip-theme', next);
      updateThemeIcon(next);
    }

    function updateThemeIcon(theme) {
      const icon = document.querySelector('.theme-toggle i');
      if (theme === 'dark') {
        icon.className = 'fa-solid fa-moon';
      } else {
        icon.className = 'fa-solid fa-sun';
      }
    }

    initTheme();
  </script>
</body>
</html>
